<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert PC Troubleshooter // XÁC THỰC DANH TÍNH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;600;700&family=Be+Vietnam+Pro:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            background: rgba(5, 10, 16, 0.95);
            border: 1px solid var(--cyber-cyan, #00f0ff);
            box-shadow: 0 0 32px rgba(0, 240, 255, 0.15), 0 0 80px rgba(0, 0, 0, 0.8);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00f0ff, transparent);
        }

        .login-title {
            font-family: 'Share Tech Mono', monospace;
            color: #00f0ff;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            margin-bottom: 4px;
        }

        .login-sub {
            font-family: 'Share Tech Mono', monospace;
            color: #4a6070;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            margin-bottom: 32px;
        }

        .login-field {
            margin-bottom: 20px;
        }

        .login-label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            color: #4a6070;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .login-input {
            width: 100%;
            background: rgba(0, 240, 255, 0.03);
            border: 1px solid #1a3040;
            border-bottom-color: #00f0ff55;
            color: #c8e8f0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.95rem;
            padding: 10px 14px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-input:focus {
            border-color: #00f0ff;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.2);
        }

        .login-btn {
            width: 100%;
            margin-top: 12px;
            background: transparent;
            border: 1px solid #00f0ff;
            color: #00f0ff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            padding: 12px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, color 0.2s;
        }

        .login-btn:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            color: #fff;
        }

        .login-error {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid #ff3232;
            color: #ff6060;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78rem;
            padding: 10px 14px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        .login-back {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.72rem;
            color: #4a6070;
            text-decoration: none;
            letter-spacing: 0.08em;
            transition: color 0.2s;
        }

        .login-back:hover {
            color: #00f0ff;
        }

        .login-lock-icon {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0.6;
        }
    </style>
</head>

<body class="cyber-body">

    <div class="scanline-overlay" aria-hidden="true"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-lock-icon">🔐</div>
            <div class="login-title">[ XÁC THỰC DANH TÍNH ]</div>
            <div class="login-sub">// TRẠM QUẢN TRỊ — YÊU CẦU QUYỀN TRUY CẬP CAO NHẤT</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, msg in messages %}
            <div class="login-error">⚠ {{ msg }}</div>
            {% endfor %}
            {% endwith %}

            {% if error %}
            <div class="login-error">✖ {{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="login-field">
                    <label class="login-label" for="username">[+] TÊN ĐĂNG NHẬP (USERNAME)</label>
                    <input class="login-input" type="text" id="username" name="username" placeholder="admin"
                        autocomplete="off" required>
                </div>
                <div class="login-field">
                    <label class="login-label" for="password">[+] MẬT KHẨU (PASSWORD)</label>
                    <input class="login-input" type="password" id="password" name="password" placeholder="••••••••"
                        required>
                </div>
                <button type="submit" class="login-btn">
                    [ &gt; XÁC NHẬN TRUY CẬP (AUTHENTICATE) ]
                </button>
            </form>

            <a href="/" class="login-back">◂ QUAY LẠI TRANG CHẨN ĐOÁN</a>
        </div>
    </div>

</body>

</html>

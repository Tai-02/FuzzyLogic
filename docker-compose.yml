services:
  db:
    image: mysql:8.0
    container_name: fuzzy_db
    restart: always
    environment:
      MYSQL_DATABASE: expert_system
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql
    networks:
      - fuzzy_net

  web:
    build: .
    container_name: fuzzy_web
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=expert_system
      - HARDWARE_AGENT_URL=http://host.docker.internal:5001
    networks:
      - fuzzy_net

  agent:
    build: .
    container_name: fuzzy_agent
    restart: always
    command: ["python", "hardware_agent.py"]
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
    networks:
      - fuzzy_net

networks:
  fuzzy_net:
    driver: bridge

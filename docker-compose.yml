version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fuzzy_db
    restart: always
    environment:
      MYSQL_DATABASE: expert_system
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql

  web:
    build: .
    container_name: fuzzy_web
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=expert_system
